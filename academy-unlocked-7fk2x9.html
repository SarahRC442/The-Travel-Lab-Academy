<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Travel Lab Academy</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Open+Sans:wght@400;600&display=block" rel="stylesheet">
<link href="https://fonts.cdnfonts.com/css/opendyslexic" rel="stylesheet">
<script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<style>
:root{
  --navy:#1F3A5F;--navy2:#0D2137;--sky:#5DADE2;--blue:#1A8FE3;
  --magenta:#E91E8C;--yellow:#F4D03F;--white:#FFFFFF;
  --card:rgba(255,255,255,0.07);--border:rgba(93,173,226,0.25);
  --text:rgba(255,255,255,0.9);--muted:rgba(255,255,255,0.6);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Open Sans",sans-serif;background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);background-attachment:fixed;color:var(--text);min-height:100vh;font-size:16px;line-height:1.7}
a{text-decoration:none;color:inherit}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.4)}
select option{background:#1F3A5F;color:white}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:rgba(255,255,255,0.05)}
::-webkit-scrollbar-thumb{background:rgba(93,173,226,0.3);border-radius:4px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:50px;border:none;cursor:pointer;font-family:"Montserrat",sans-serif;font-weight:700;font-size:15px;letter-spacing:0.5px;transition:all 0.2s;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,var(--magenta),#FF6BB3);color:white;box-shadow:0 4px 20px rgba(233,30,140,0.4)}
.btn-secondary{background:linear-gradient(135deg,var(--blue),var(--sky));color:white;box-shadow:0 4px 20px rgba(26,143,227,0.3)}
.btn-outline{background:transparent;color:white;border:2px solid rgba(255,255,255,0.3)}
.btn:hover{transform:translateY(-2px)}
@keyframes floatUp{0%{transform:translateY(0) rotate(0deg)}100%{transform:translateY(-110vh) rotate(360deg)}}
body.ttl-calm *{animation:none !important;transition:none !important;}
@keyframes lbFloat{0%,100%{transform:translateY(0) rotate(-6deg)}50%{transform:translateY(-30px) rotate(6deg)}}
@page{margin:14mm}
@media print{
  *{-webkit-print-color-adjust:exact !important;print-color-adjust:exact !important}
  body{background:white !important}
  .no-print,nav,.app-footer,.myway-btn,.lb-floaters,.float-emoji{display:none !important}
  .cert-print{border:3px solid #1F3A5F !important;box-shadow:none !important;break-inside:avoid;page-break-inside:avoid;max-width:100% !important}
  .print-page{page-break-after:always;break-after:page}
  .print-page:last-child{page-break-after:auto;break-after:auto}
  .print-avoid{break-inside:avoid;page-break-inside:avoid}
  img{max-width:100% !important}
  textarea,input{border:1px solid #999 !important}
}
</style>
</head>
<body>
<div id="root"></div>
<div id="ttl-error" style="display:none;position:fixed;top:0;left:0;right:0;z-index:99999;background:#E91E8C;color:#fff;font-family:sans-serif;padding:14px 18px;font-size:14px;line-height:1.5"></div>
<script>
window.addEventListener('error',function(e){
  // Ignore non-fatal resource load errors (slow/blocked fonts, stylesheets, images).
  if(e && e.target && e.target!==window && (e.target.tagName==='LINK'||e.target.tagName==='IMG'||e.target.tagName==='SCRIPT')){ return; }
  if(!e.error && !e.message){ return; }
  var b=document.getElementById('ttl-error');
  if(b){b.style.display='block';b.textContent='Notice: '+(e.message||'load error')+' (the page is still loading its tools, give it a few seconds).';}
},true);
</script>
