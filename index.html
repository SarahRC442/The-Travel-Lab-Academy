<title>The Travel Lab — Adventures That Build Brilliant Minds</title>

<style>
:root{
  --navy:#1F3A5F;--navy2:#0D2137;--sky:#5DADE2;--blue:#1A8FE3;
  --magenta:#E91E8C;--yellow:#F4D03F;--white:#FFFFFF;
  --card:rgba(255,255,255,0.07);--border:rgba(93,173,226,0.25);
  --text:rgba(255,255,255,0.9);--muted:rgba(255,255,255,0.6);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:"Open Sans",sans-serif;background:linear-gradient(135deg,var(--navy) 0%,var(--navy2) 100%);background-attachment:fixed;color:var(--text);min-height:100vh;font-size:16px;line-height:1.7}
a{text-decoration:none;color:inherit}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,0.4)}
select option{background:#1F3A5F;color:white}
::-webkit-scrollbar{width:8px}
::-webkit-scrollbar-track{background:rgba(255,255,255,0.05)}
::-webkit-scrollbar-thumb{background:rgba(93,173,226,0.3);border-radius:4px}
.btn{display:inline-flex;align-items:center;gap:8px;padding:14px 28px;border-radius:50px;border:none;cursor:pointer;font-family:"Montserrat",sans-serif;font-weight:700;font-size:15px;letter-spacing:0.5px;transition:all 0.2s;text-decoration:none}
.btn-primary{background:linear-gradient(135deg,var(--magenta),#FF6BB3);color:white;box-shadow:0 4px 20px rgba(233,30,140,0.4)}
.btn-secondary{background:linear-gradient(135deg,var(--blue),var(--sky));color:white;box-shadow:0 4px 20px rgba(26,143,227,0.3)}
.btn-outline{background:transparent;color:white;border:2px solid rgba(255,255,255,0.3)}
.btn:hover{transform:translateY(-2px)}
@keyframes floatUp{0%{transform:translateY(0) rotate(0deg)}100%{transform:translateY(-110vh) rotate(360deg)}}
@media print{
  body{background:white !important}
  .no-print,nav,.app-footer,.myway-btn{display:none !important}
  .cert-print{border:3px solid #1F3A5F !important;box-shadow:none !important}
}
</style>

const EMOJIS = ['✈️','🦩','🚕','🚌','⛴️','🏗️','🚐','⭐','🗺️','🏛️'];

function FloatingEmojis(){
  const items = useMemo(()=>{
    const arr=[];
    for(let i=0;i<18;i++){
      arr.push({emoji:EMOJIS[Math.floor(Math.random()*EMOJIS.length)],left:Math.random()*100,delay:Math.random()*20,duration:18+Math.random()*22,size:18+Math.random()*22,opacity:0.18+Math.random()*0.22});
    }
    return arr;
  },[]);
  return (
    <div style={{position:'fixed',inset:0,overflow:'hidden',pointerEvents:'none',zIndex:0}}>
      {items.map((it,i)=>(
        <span key={i} style={{position:'absolute',left:it.left+'%',bottom:'-60px',fontSize:it.size+'px',opacity:it.opacity,animation:`floatUp ${it.duration}s linear ${it.delay}s infinite`}}>{it.emoji}</span>
      ))}
    </div>
  );
}

function DrawCanvas({height=300}){
  const ref=useRef(null);
  const [drawMode,setDrawMode]=useState(false);
  const [color,setColor]=useState('#ffffff');
  const [size,setSize]=useState(4);
  const drawing=useRef(false), last=useRef({x:0,y:0});
  useEffect(()=>{
    const c=ref.current; if(!c) return;
    c.width=c.offsetWidth;
    const r=()=>{c.width=c.offsetWidth};
    window.addEventListener('resize',r);
    return ()=>window.removeEventListener('resize',r);
  },[]);
  const pos=(e)=>{const c=ref.current,r=c.getBoundingClientRect();const sx=c.width/r.width,sy=c.height/r.height;const cx=e.touches?e.touches[0].clientX:e.clientX;const cy=e.touches?e.touches[0].clientY:e.clientY;return {x:(cx-r.left)*sx,y:(cy-r.top)*sy};};
  const start=(e)=>{if(!drawMode)return;e.preventDefault();drawing.current=true;last.current=pos(e);};
  const move=(e)=>{if(!drawing.current||!drawMode)return;e.preventDefault();const c=ref.current,ctx=c.getContext('2d'),p=pos(e);ctx.beginPath();ctx.moveTo(last.current.x,last.current.y);ctx.lineTo(p.x,p.y);ctx.strokeStyle=color;ctx.lineWidth=size;ctx.lineCap='round';ctx.lineJoin='round';ctx.stroke();last.current=p;};
  const stop=()=>{drawing.current=false;};
  const clear=()=>{const c=ref.current;c.getContext('2d').clearRect(0,0,c.width,c.height);};
  const colors=['#ffffff','#5DADE2','#E91E8C','#F4D03F','#2ecc71'];
  return (
    <div style={{border:'2px solid rgba(233,30,140,0.4)',borderRadius:16,overflow:'hidden',background:'rgba(255,255,255,0.04)'}}>
      <canvas ref={ref} height={height} onMouseDown={start} onMouseMove={move} onMouseUp={stop} onMouseLeave={stop} onTouchStart={start} onTouchMove={move} onTouchEnd={stop} style={{display:'block',width:'100%',height,touchAction:drawMode?'none':'auto',cursor:drawMode?'crosshair':'default'}}/>
      <div className="no-print" style={{display:'flex',gap:8,padding:'10px 14px',background:'rgba(0,0,0,0.3)',alignItems:'center',flexWrap:'wrap'}}>
        <button onClick={()=>setDrawMode(d=>!d)} style={{display:'flex',alignItems:'center',gap:6,borderRadius:20,padding:'4px 14px',cursor:'pointer',fontFamily:'Montserrat,sans-serif',fontWeight:700,fontSize:11,background:drawMode?'rgba(26,143,227,0.2)':'rgba(255,255,255,0.08)',border:'2px solid '+(drawMode?'var(--blue)':'rgba(255,255,255,0.2)'),color:drawMode?'var(--sky)':'rgba(255,255,255,0.6)'}}>
          <span style={{width:8,height:8,borderRadius:'50%',background:drawMode?'var(--sky)':'rgba(255,255,255,0.3)'}}/>✏️ Draw Mode: {drawMode?'ON':'OFF'}
        </button>
        {colors.map(c=>(<div key={c} onClick={()=>setColor(c)} style={{width:24,height:24,borderRadius:'50%',background:c,cursor:'pointer',border:color===c?'2px solid white':'2px solid rgba(255,255,255,0.3)',transform:color===c?'scale(1.2)':'none'}}/>))}
        {[3,6,12].map(sz=>(<button key={sz} onClick={()=>setSize(sz)} style={{background:size===sz?'var(--blue)':'rgba(255,255,255,0.1)',border:'1px solid rgba(255,255,255,0.2)',color:'white',borderRadius:6,padding:'4px 10px',cursor:'pointer',fontSize:11,fontFamily:'Montserrat,sans-serif',fontWeight:700}}>{sz===3?'S':sz===6?'M':'L'}</button>))}
        <button onClick={clear} style={{marginLeft:'auto',background:'rgba(233,30,140,0.2)',border:'1px solid rgba(233,30,140,0.4)',color:'var(--magenta)',borderRadius:20,padding:'4px 14px',cursor:'pointer',fontSize:11,fontFamily:'Montserrat,sans-serif',fontWeight:700}}>Clear</button>
      </div>
    </div>
  );
}

          {ch.fields.length>0&&(<div style={{display:'grid',gridTemplateColumns:ch.fields.some(f=>!f.wide)?'repeat(auto-fit,minmax(240px,1fr))':'1fr',gap:16,marginBottom:20}}>{ch.fields.map((f,i)=><Field key={i} f={f}/>)}</div>)}
          <div style={{marginBottom:20}}><span style={{fontFamily:'Montserrat,sans-serif',fontWeight:700,fontSize:14,color:'var(--magenta)',marginBottom:10,display:'block'}}>{ch.draw}</span><DrawCanvas height={ch.n===9?420:300}/></div>
          <CompleteBox/>
        </div>
        );
      })}
      {FREE_CHALLENGES ? (
        <div style={{background:'var(--card)',border:'2px solid rgba(233,30,140,0.35)',borderRadius:20,padding:32,marginBottom:28,position:'relative',overflow:'hidden',textAlign:'center'}}>
          <div style={{position:'absolute',top:0,left:0,right:0,height:4,background:'linear-gradient(90deg,var(--magenta),#FF6BB3)'}}/>
          <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:16,flexWrap:'wrap',justifyContent:'center'}}>
            <div style={{background:'rgba(255,255,255,0.08)',color:'var(--muted)',fontFamily:'Montserrat,sans-serif',fontWeight:700,fontSize:11,letterSpacing:2,padding:'6px 14px',borderRadius:50}}>REAL WORLD MISSION</div>
            <div style={{fontFamily:'Montserrat,sans-serif',fontWeight:900,fontSize:'clamp(18px,3vw,24px)',color:'rgba(255,255,255,0.55)'}}>🔒 {REAL_WORLD.title}</div>
          </div>
          <div style={{fontSize:48,marginBottom:12}}>🔒</div>
          <p style={{color:'var(--muted)',fontSize:15,maxWidth:440,margin:'0 auto 20px'}}>The Real World Mission is part of the full pack. Unlock everything, plus your certificate, for £5.99.</p>
          <button onClick={()=>go('purchase','001')} className="btn btn-primary" style={{fontSize:16}}>🔓 Unlock the full mission £5.99</button>
        </div>
      ) : (
      <div style={{background:'var(--card)',border:'2px solid rgba(233,30,140,0.3)',borderRadius:20,padding:32,marginBottom:28,position:'relative',overflow:'hidden'}}>
        <div style={{position:'absolute',top:0,left:0,right:0,height:4,background:'linear-gradient(90deg,var(--magenta),#FF6BB3)'}}/>
        <div style={{display:'flex',alignItems:'center',gap:14,marginBottom:20,flexWrap:'wrap'}}>
          <div style={{background:'linear-gradient(135deg,var(--magenta),#FF6BB3)',color:'white',fontFamily:'Montserrat,sans-serif',fontWeight:700,fontSize:11,letterSpacing:2,padding:'6px 14px',borderRadius:50}}>REAL WORLD MISSION</div>
          <div style={{fontFamily:'Montserrat,sans-serif',fontWeight:900,fontSize:'clamp(18px,3vw,24px)',color:'white'}}>{REAL_WORLD.icon} {REAL_WORLD.title}</div>
        </div>
        <p style={{color:'var(--muted)',marginBottom:16}}>{REAL_WORLD.intro}</p>
        <p style={{fontFamily:'Montserrat,sans-serif',fontWeight:700,fontSize:14,color:'var(--magenta)',marginBottom:12}}>At the Airport</p>
        <Spotter items={REAL_WORLD.airport}/>
        <p style={{fontFamily:'Montserrat,sans-serif',fontWeight:700,fontSize:14,color:'var(--magenta)',margin:'16px 0 12px'}}>In the City</p>
        <Spotter items={REAL_WORLD.city}/>
        <div style={{marginTop:20}}><Field f={REAL_WORLD.field}/></div>
        <div><span style={{fontFamily:'Montserrat,sans-serif',fontWeight:700,fontSize:14,color:'var(--magenta)',marginBottom:10,display:'block'}}>{REAL_WORLD.draw}</span><DrawCanvas height={280}/></div>
        <CompleteBox/>
      </div>
      )}
      {FREE_CHALLENGES ? (
        <div style={{textAlign:'center',padding:'20px 0 40px'}} className="no-print">
          <button onClick={()=>go('purchase','001')} className="btn btn-primary" style={{fontSize:18,padding:'18px 48px'}}>🔓 Unlock the Full Mission £5.99</button>
        </div>
      ) : (
        <div style={{textAlign:'center',padding:'40px 0'}} className="no-print">
          <button onClick={()=>{setComplete(true);window.scrollTo(0,0);}} className="btn btn-primary" style={{fontSize:18,padding:'18px 48px'}}>🏆 I Have Completed My Mission!</button>
        </div>
      )}
    </div>
  );
}

// ===== ROUTER / APP =====
function App(){
  const [page,setPage]=useState('home');
  const [param,setParam]=useState(null);
  const go=(p,x=null)=>{setPage(p);setParam(x);window.scrollTo(0,0);};
  let content;
  if(page==='home') content=<HomePage go={go}/>;
  else if(page==='missions') content=<LibraryPage go={go}/>;
  else if(page==='certificate') content=<CertificatePage/>;
  else if(page==='taster') content=<TasterPage go={go}/>;
  else if(page==='purchase') content=<PurchasePage id={param} go={go}/>;
  else if(page==='control') content=<MissionControlPage go={go}/>;
  else if(page==='about') content=<AboutPage/>;
  else if(page==='mission001') content=<Mission001Page go={go}/>;
  else content=<HomePage go={go}/>;
  return (
    <>
      <FloatingEmojis/>
      <NavBar go={go}/>
      <main style={{position:'relative',zIndex:1,minHeight:'70vh'}}>{content}</main>
      <Footer go={go}/>
      <MyWay/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
